<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Islamic Fiqh Quiz</title>
    <style>
        :root {
            --primary-color: #0d47a1;
            /* Deep Blue */
            --secondary-color: #f9a825;
            /* Gold/Yellow */
            --light-color: #ffffff;
            --dark-color: #0a3371;
            --bg-color: #e3f2fd;
            /* Light Blue Background */
            --text-color: #212121;
            --danger-color: #d32f2f;
            --success-color: #388e3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* display: flex;
            justify-content: center;
            align-items: flex-start; */
            min-height: 100vh;
            padding: 0;
            max-width: px;
            margin: 0 auto;
        }

        .container {
            /* width: 100%; */
            max-width: 550px;
            background-color: var(--light-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #bbdefb;
            margin: 0 auto;
        }

        /* --- Header Stats --- */
        .header-stats {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            background: linear-gradient(90deg, orange, red, orange);
            color: var(--light-color);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }

        /* --- Fiqh Fact --- */
        /* UPDATED: Fiqh Facts container with scrollable functionality */
        .fiqh-fact-container {
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .fiqh-fact-scroller {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }

        .fiqh-fact-scroller::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        .fiqh-fact {
            flex: 0 0 100%;
            scroll-snap-align: start;
            background: #fff6b9;
            border-left: 5px solid var(--secondary-color);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .fiqh-fact.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- Screens --- */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1,
        h2 {
            text-align: center;
            color: red;
            margin-bottom: 20px;
        }

        /* --- Home Screen --- */
        #level-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .level-btn {
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background-color: #ff6600;
            color: var(--light-color);
            transition: all 0.2s, box-shadow 0.2s;
            position: relative;
            visibility: visible !important;
            opacity: 1 !important;
            display: block !important;
        }

        .level-btn:not(.locked):hover {
            transform: translateY(-5px) rotateX(-20deg) scaleY(1.1);
            box-shadow: 0 6px 15px #0d47a166;
        }

        .level-btn.locked {
            background-color: #ffd2d2;
            color: #ffffff;
            cursor: not-allowed;
        }

        .level-btn.locked::after {
            content: "🔒";
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 1rem;
        }

        /* --- Quiz Screen --- */
        #question-text {
            font-size: 1.3rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--light-color);
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            margin-bottom: 8px;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--primary-color);
            color: var(--light-color);
        }

        .option-btn.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: var(--light-color);
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
            color: var(--light-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* --- Result/Lockout Screens --- */
        .centered-screen {
            text-align: center;
            padding: 30px 20px;
        }

        .centered-screen p {
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background-color: var(--secondary-color);
            color: var(--text-color);
        }

        .btn-secondary {
            background-color: var(--primary-color);
            color: var(--light-color);
            margin-top: 10px;
        }

        #countdown-timer {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--danger-color);
            margin: 20px 0;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }

        /* NEW STYLES FOR ADDED FEATURES */
        #global-progress-container {
            margin: 15px 0;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 10px;
        }

        #stats-container {
            margin: 10px 0;
        }

        #stats-toggle-btn {
            padding: 8px 16px;
            background: linear-gradient(90deg, orange, red, orange);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 10px 0;
            width: 100%;
        }

        #stats-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        #level-progress-bar {
            margin: 15px 0;
        }

        #level-timer-container {
            text-align: center;
            margin: 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #d32f2f;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .reward-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s ease-out;
        }

        /* Add this CSS for the main overall accuracy progress bar */
        #main-accuracy-progress {
            margin: 20px 0;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
        }

        #main-accuracy-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ff6200;
            font-size: 1.2rem;
        }

        #main-accuracy-bar {
            width: 100%;
            height: 12px;
            background: #ffddad;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        #main-accuracy-fill {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: all 0.5s ease;
        }

        #main-accuracy-percentage {
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            color: red;
        }

        /* Ensure countdown display is visible */
        #quiz-countdown {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .quiz-countdown {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--danger-color);
            margin: 10px 0;
            padding: 8px;
            background: #ffebee;
            border-radius: 8px;
            text-align: center;
        }

        /* NEW STYLES FOR LEVEL ACCURACY PROGRESS BARS */
        .level-accuracy-container {
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .level-accuracy-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .level-accuracy-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .level-accuracy-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: all 0.5s ease;
        }

        /* NEW: Level button accuracy display */
        .level-btn::before {
            content: attr(data-accuracy);
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--secondary-color);
            color: var(--text-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .level-btn.locked::before {
            display: none;
        }

        /* NEW: Hide level accuracy bars by default */
        #level-accuracy-container {
            display: none;
        }

        a {
            text-decoration: none;
            color: whitesmoke;
            padding: 0.5rem;
            background: linear-gradient(90deg, orange, red, orange);
            border-radius: 350px;
            font-weight: bold;
            text-align: center;
            transition-property: all;
            transition-duration: 0.2s;
            justify-self: stretch;
            margin-top: 1rem;
            box-sizing: content-box;
        }

        .btn-last {
            display: grid;
            justify-self: stretch;
            cursor: pointer;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 3px 5px 15px orange;
        }

        /* Responsive fixes for level buttons */
        @media (max-width: 480px) {
            #level-selection {
                grid-template-columns: repeat(auto-fill,
                        minmax(80px, 1fr)) !important;
                gap: 12px !important;
            }

            .level-btn::before {
                width: 25px;
                height: 25px;
                font-size: 0.6rem;
                top: -5px;
                right: -5px;
            }
        }

        @media (max-width: 360px) {
            #level-selection {
                grid-template-columns: repeat(auto-fill,
                        minmax(70px, 1fr)) !important;
                gap: 10px !important;
            }
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 300px) {
            .nav {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr 1fr;
                text-align: center;
            }

            .one {
                grid-column: 1/2;
            }

            .two {
                grid-column: 1/2;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header: Score, Coins, Hearts -->
        <div class="header-stats">
            <div class="stat-item">⭐ Score: <span id="score-display">0</span></div>
            <div class="stat-item">💰 Coins: <span id="coins-display">0</span></div>
            <div class="stat-item">
                ❤ Hearts: <span id="hearts-display">10</span>
            </div>
        </div>

        <!-- UPDATED: Dynamic Fiqh Facts Section -->
        <div class="fiqh-fact-container">
            <div class="fiqh-fact-scroller" id="fiqh-fact-scroller">
                <!-- Fiqh facts will be dynamically inserted here by JavaScript -->
            </div>
        </div>

        <!-- Home Screen (Level Selection) -->
        <div id="home-screen" class="screen active">
            <h2>Select a Level</h2>
            <!-- <div id="global-progress-container"></div> -->
            <div id="stats-container"></div>
            <div id="main-accuracy-progress"></div>

            <!-- NEW: Level accuracy progress bars container -->
            <div id="level-accuracy-container"></div>

            <div id="level-selection">
                <!-- Level buttons generated by JS -->
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <h2 id="level-title">Level X</h2>
            <div id="level-progress-bar"></div>
            <div id="quiz-countdown-container"></div>
            <div id="level-timer-container"></div>
            <p id="question-text">Question text goes here...</p>
            <div id="options-container">
                <!-- Option buttons generated by JS -->
            </div>
        </div>

        <!-- Level Complete Screen -->
        <div id="level-complete-screen" class="screen centered-screen">
            <h2 id="complete-title">Mubarak Ho!</h2>
            <p id="complete-message">
                Aapne level complete kar liya hai. Aapko +50 coins mile hain!
            </p>
            <button id="next-level-btn" class="btn btn-primary">Next Level</button>
            <br />
            <button id="home-btn-from-complete" class="btn btn-secondary">
                Home
            </button>
        </div>

        <!-- Lockout Screen (No Hearts) -->
        <div id="lockout-screen" class="screen centered-screen">
            <h2>Dil Khatm Ho Gaye!</h2>
            <p>
                Agle level ke liye intezar karein ya 50 coins dekar continue karein.
            </p>
            <div id="countdown-timer">10:00</div>
            <button id="unlock-with-coins-btn" class="btn btn-primary">
                Pay 50 💰 & Continue
            </button>
            <br />
            <button id="home-btn-from-lockout" class="btn btn-secondary">
                Go to Home
            </button>
        </div>
        <a href="home.html" class="nav-btn btn-last">Menue</a>
    </div>

                    audio.load();

                    audio.addEventListener("error", (e) => {
                        console.warn(`Audio file failed to load: ${audio.src}`);
                        if (audio === audioElements.click) {
                            const context = new(window.AudioContext ||
                                window.webkitAudioContext)();
                            const oscillator = context.createOscillator();
                            const gainNode = context.createGain();

                            oscillator.connect(gainNode);
                            gainNode.connect(context.destination);

                            oscillator.frequency.value = 800;
                            oscillator.type = "sine";
                            gainNode.gain.value = 0.1;

                            oscillator.start();
                            setTimeout(() => {
                                oscillator.stop();
                            }, 50);
                        }
                    });

                    audio.addEventListener("canplaythrough", () => {
                        console.log(`Audio loaded: ${audio.src}`);
                    });
                });
            }

                // Clear existing facts

                    const factElement = document.createElement("div");
                    factElement.className = "fiqh-fact";
                    factElement.innerHTML = `💡 <strong>Fiqh Fact:</strong> ${fact}`;
                    if (index === 0) {
                        factElement.classList.add("active");
                    }
                    fiqhFactScroller.appendChild(factElement);
                });

                // Start auto-scroll
                startFiqhFactAutoScroll();

                // Add scroll event listener for manual scrolling
                fiqhFactScroller.addEventListener("scroll", handleFiqhFactScroll);
            }

            function startFiqhFactAutoScroll() {
                // Clear any existing interval
                if (fiqhFactInterval) {
                    clearInterval(fiqhFactInterval);
                }

                // Set up new interval for auto-scrolling
                fiqhFactInterval = setInterval(() => {
                    if (!isUserScrolling) {
                        showNextFiqhFact();
                    }
                }, 5000); // Change fact every 5 seconds
            }

            function showNextFiqhFact() {
                // Remove active class from current fact
                const currentFact =
                    fiqhFactScroller.querySelector(".fiqh-fact.active");
                if (currentFact) {
                    currentFact.classList.remove("active");
                }

                // Update index
                currentFactIndex = (currentFactIndex + 1) % fiqhFacts.length;

                // Get next fact element
                const facts = fiqhFactScroller.querySelectorAll(".fiqh-fact");
                const nextFact = facts[currentFactIndex];

                // Add active class with delay for smooth transition
                setTimeout(() => {
                    nextFact.classList.add("active");
                }, 50);

                // Scroll to the next fact
                fiqhFactScroller.scrollTo({
                    left: nextFact.offsetLeft,
                    behavior: "smooth",
                });
            }

            function handleFiqhFactScroll() {
                // User is manually scrolling
                if (!isUserScrolling) {
                    isUserScrolling = true;

                    // Clear auto-scroll interval
                    if (fiqhFactInterval) {
                        clearInterval(fiqhFactInterval);
                    }

                    // Update current fact index based on scroll position
                    const scrollPosition = fiqhFactScroller.scrollLeft;
                    const factWidth = fiqhFactScroller.offsetWidth;
                    currentFactIndex = Math.round(scrollPosition / factWidth);

                    // Update active fact
                    const facts = fiqhFactScroller.querySelectorAll(".fiqh-fact");
                    facts.forEach((fact, index) => {
                        fact.classList.toggle("active", index === currentFactIndex);
                    });
                }

                // Clear any existing resume timeout
                if (scrollResumeTimeout) {
                    clearTimeout(scrollResumeTimeout);
                }

                // Set timeout to resume auto-scroll after user stops scrolling
                scrollResumeTimeout = setTimeout(() => {
                    isUserScrolling = false;
                    startFiqhFactAutoScroll();
                }, 8000); // Resume after 8 seconds of inactivity
            }

                        correct: 0,
                        total: 0,
                    };
                }
                extendedState.levelProgress[currentLevel].total++;

                if (selectedIndex === correctIndex) {
                    button.classList.add("correct");

                    if (!extendedState.completedLevels.includes(currentLevel)) {
                        gameState.score += 1;
                    }

                    extendedState.currentStreak++;
                    extendedState.levelProgress[currentLevel].correct++;

                    playAudio("correct");

                    const progress =
                        ((currentQuestionIndex + 1) / quizData[currentLevel].length) *
                        100;
                    updateLevelProgressBar(progress, true);

                    checkRowReward();
                } else {
                    button.classList.add("wrong");
                    allOptions[correctIndex].classList.add("correct");
                    gameState.hearts -= 1;
                    extendedState.currentStreak = 0;

                    const progress =
                        ((currentQuestionIndex + 1) / quizData[currentLevel].length) *
                        100;
                    updateLevelProgressBar(progress, false);

                    playAudio("wrong");

                    if (gameState.hearts <= 0) {
                        gameState.hearts = 0;
                        gameState.lockoutEndTime = Date.now() + 10 * 60 * 1000;
                        gameState.lockoutPoint = {
                            level: currentLevel,
                            questionIndex: currentQuestionIndex,
                            timeLeft: extendedState.currentTimeLeft,
                        };
                        updateUI();
                        saveState();
                        setTimeout(() => {
                            playAudio("levelFailed");
                            showLockoutScreen();
                        }, 1500);
                        return;
                    }
                }

                updateUI();
                saveState();

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex >= quizData[currentLevel].length) {
                        finishLevel();
                    } else {
                        displayQuestion();
                    }
                }, 1500);
            }

            // UPDATED: Finish level with new accuracy calculation
            function finishLevel() {
                stopTimer();

                const baseCoins = 30;
                let totalCoins = baseCoins;

                const perfectLevel =
                    extendedState.levelProgress[currentLevel] &&
                    extendedState.levelProgress[currentLevel].correct ===
                    quizData[currentLevel].length;

                if (perfectLevel) {
                    totalCoins += 20;
                    extendedState.coinsEarned += 20;
                }

                gameState.coins += totalCoins;
                extendedState.coinsEarned += baseCoins;

                if (!extendedState.completedLevels.includes(currentLevel)) {
                    extendedState.completedLevels.push(currentLevel);
                }

                // UPDATED: Use new accuracy calculation
                const correctAnswers = extendedState.levelProgress[currentLevel] ?
                    extendedState.levelProgress[currentLevel].correct :
                    0;
                updateLevelAccuracy(currentLevel, correctAnswers);

                const nextLevel = currentLevel + 1;
                if (nextLevel <= TOTAL_LEVELS) {
                    if (!Array.isArray(gameState.unlockedLevels)) {
                        gameState.unlockedLevels = [1];
                    }

                    if (!gameState.unlockedLevels.includes(nextLevel)) {
                        gameState.unlockedLevels.push(nextLevel);
                        console.log(`Unlocked level ${nextLevel}`);
                    }
                }

                gameState.lockoutPoint = null;

                if (currentLevel === TOTAL_LEVELS) {
                    playAudio("allComplete");
                    completeTitle.textContent = "Masha'Allah! Quiz Pura Hua!";
                    completeMessage.textContent =
                        "Aapne saare 10 levels kamyabi se pure kar liye hain. JazakAllah Khaira!";
                    buttons.nextLevel.style.display = "none";
                } else {
                    playAudio("levelComplete");
                    completeTitle.textContent = "Mubarak Ho!";
                    let message = `Aapne Level ${currentLevel} complete kar liya hai. Aapko ${totalCoins} coins mile hain!`;
                    if (perfectLevel) {
                        message += " (Perfect level bonus +20 coins!)";
                    }
                    completeMessage.textContent = message;
                    buttons.nextLevel.style.display = "inline-block";
                }

                saveState();
                updateUI();
                updateGlobalProgress();
                updateMainAccuracyProgress();
                showScreen("complete");
            }

            function showLockoutScreen() {
                stopTimer();
                showScreen("lockout");
                if (lockoutInterval) clearInterval(lockoutInterval);

                const updateTimer = () => {
                    const timeLeft = gameState.lockoutEndTime - Date.now();
                    if (timeLeft <= 0) {
                        clearInterval(lockoutInterval);
                        countdownTimer.textContent = "Unlocked!";
                        gameState.hearts = 10;
                        gameState.lockoutPoint = null;
                        saveState();
                        updateUI();
                        setTimeout(() => renderHomeScreen(), 2000);
                        return;
                    }
                    const minutes = Math.floor(timeLeft / 60000);
                    const seconds = Math.floor((timeLeft % 60000) / 1000);
                    countdownTimer.textContent = `${String(minutes).padStart(
              2,
              "0"
            )}:${String(seconds).padStart(2, "0")}`;
                };
                updateTimer();
                lockoutInterval = setInterval(updateTimer, 1000);
            }

            // ... (rest of the existing functions remain the same, including payToUnlock, timer functions, etc.)

            function payToUnlock() {
                if (gameState.coins >= 50) {
                    gameState.coins -= 50;
                    extendedState.coinsUsed += 50;
                    gameState.hearts = 10;
                    gameState.lockoutEndTime = null;
                    if (lockoutInterval) clearInterval(lockoutInterval);

                    if (gameState.lockoutPoint) {
                        currentLevel = gameState.lockoutPoint.level;
                        currentQuestionIndex = gameState.lockoutPoint.questionIndex;

                        if (gameState.lockoutPoint.timeLeft) {
                            extendedState.currentTimeLeft = gameState.lockoutPoint.timeLeft;
                        }

                        gameState.lockoutPoint = null;

                        saveState();
                        updateUI();

                        levelTitle.textContent = `Level ${currentLevel}`;
                        createLevelProgressBar();
                        const progress =
                            (currentQuestionIndex / quizData[currentLevel].length) * 100;
                        updateLevelProgressBar(progress, true);

                        if (extendedState.currentTimeLeft > 0) {
                            createQuizCountdown();
                            startLevelTimer(extendedState.currentTimeLeft / 60);
                        }

                        showScreen("quiz");
                        displayQuestion();
                    } else {
                        saveState();
                        updateUI();
                        renderHomeScreen();
                    }
                } else {
                    alert("Afsos! Aapke paas kaafi coins nahi hain.");
                }
            }

            // Timer functions (unchanged)
            function startLevelTimer(minutes) {
                if (extendedState.currentTimer) {
                    clearInterval(extendedState.currentTimer);
                }

                extendedState.currentTimeLeft = minutes * 60;
                updateTimerDisplay();
                updateQuizCountdown();

                extendedState.currentTimer = setInterval(() => {
                    extendedState.currentTimeLeft--;
                    updateTimerDisplay();
                    updateQuizCountdown();

                    if (extendedState.currentTimeLeft <= 0) {
                        clearInterval(extendedState.currentTimer);
                        playAudio("levelFailed");
                        showScreen("home");
                        renderHomeScreen();
                    }
                }, 1000);
            }

            function createLevelProgressBar() {
                const container = document.getElementById("level-progress-bar");
                if (!container) return;

                container.innerHTML = "";

                const progressBar = document.createElement("div");
                progressBar.className = "progress-bar";

                const progressFill = document.createElement("div");
                progressFill.id = "level-progress-fill";
                progressFill.className = "progress-fill";

                progressBar.appendChild(progressFill);
                container.appendChild(progressBar);
            }

            function updateLevelProgressBar(progress, isCorrect) {
                const progressFill = document.getElementById("level-progress-fill");
                if (progressFill) {
                    progressFill.style.width = `${progress}%`;

                    if (isCorrect) {
                        const red = Math.max(0, 255 - progress * 2.55);
                        const green = Math.min(255, progress * 2.55);
                        progressFill.style.background = `rgb(${red}, ${green}, 0)`;
                    } else {
                        progressFill.style.background = "#d32f2f";
                    }
                }
            }

            function createTimerInput() {
                const container = document.getElementById("level-timer-container");
                if (!container) return;

                container.innerHTML = "";

                const timeContainer = document.createElement("div");
                timeContainer.style.cssText = `
                    text-align: center;
                    margin: 15px 0;
                `;

                const timeLabel = document.createElement("label");
                timeLabel.textContent = "Set time (minutes): ";
                timeLabel.style.cssText = `
                    font-weight: bold;
                    color: var(--primary-color);
                    margin-right: 10px;
                `;

                const timeInput = document.createElement("input");
                timeInput.type = "number";
                timeInput.min = "1";
                timeInput.max = "60";
                timeInput.value = extendedState.levelTimes[currentLevel] || "5";
                timeInput.style.cssText = `
                    padding: 8px;
                    border: 2px solid var(--primary-color);
                    border-radius: 5px;
                    width: 80px;
                    text-align: center;
                    font-size: 1rem;
                    margin-right: 10px;
                `;

                const timerDisplay = document.createElement("div");
                timerDisplay.id = "level-timer-display";
                timerDisplay.style.cssText = `
                    font-size: 1.5rem;
                    font-weight: bold;
                    color: var(--danger-color);
                    margin: 10px 0;
                    padding: 10px;
                    background: #ffebee;
                    border-radius: 8px;
                    display: none;
                `;

                const startButton = document.createElement("button");
                startButton.textContent = "Start Level";
                startButton.className = "btn btn-primary";
                startButton.style.marginTop = "10px";

                startButton.addEventListener("click", () => {
                    const userTime = parseInt(timeInput.value) || 5;
                    extendedState.levelTimes[currentLevel] = userTime;
                    startLevelTimer(userTime);
                    timeContainer.style.display = "none";
                    timerDisplay.style.display = "block";
                    createQuizCountdown();
                    displayQuestion();
                });

                timeContainer.appendChild(timeLabel);
                timeContainer.appendChild(timeInput);
                timeContainer.appendChild(startButton);
                timeContainer.appendChild(timerDisplay);
                container.appendChild(timeContainer);
            }

            function createQuizCountdown() {
                const container = document.getElementById("quiz-countdown-container");
                if (!container) return;

                container.innerHTML = "";

                const countdownDisplay = document.createElement("div");
                countdownDisplay.id = "quiz-countdown";
                countdownDisplay.className = "quiz-countdown";
                countdownDisplay.textContent = "Time: 00:00";
                countdownDisplay.style.cssText = `
                    display: block !important;
                    visibility: visible !important;
                    opacity: 1 !important;
                `;

                container.appendChild(countdownDisplay);
            }

            function updateQuizCountdown() {
                const countdownDisplay = document.getElementById("quiz-countdown");
                if (countdownDisplay && extendedState.currentTimeLeft > 0) {
                    const minutes = Math.floor(extendedState.currentTimeLeft / 60);
                    const seconds = extendedState.currentTimeLeft % 60;
                    countdownDisplay.textContent = `Time: ${minutes}:${
              seconds < 10 ? "0" : ""
            }${seconds}`;

                    if (extendedState.currentTimeLeft <= 30) {
                        countdownDisplay.style.color = "#d32f2f";
                        countdownDisplay.style.background = "#ffcdd2";
                    } else if (extendedState.currentTimeLeft <= 60) {
                        countdownDisplay.style.color = "#f57c00";
                        countdownDisplay.style.background = "#ffe0b2";
                    } else {
                        countdownDisplay.style.color = "var(--danger-color)";
                        countdownDisplay.style.background = "#ffebee";
                    }
                }
            }

            function updateTimerDisplay() {
                const timerDisplay = document.getElementById("level-timer-display");
                if (timerDisplay) {
                    const minutes = Math.floor(extendedState.currentTimeLeft / 60);
                    const seconds = extendedState.currentTimeLeft % 60;
                    timerDisplay.textContent = `${minutes}:${
              seconds < 10 ? "0" : ""
            }${seconds}`;
                }
            }

            function stopTimer() {
                if (extendedState.currentTimer) {
                    clearInterval(extendedState.currentTimer);
                    extendedState.currentTimer = null;
                }
            }

            function checkRowReward() {
                if (
                    extendedState.currentStreak % 5 === 0 &&
                    extendedState.currentStreak > 0
                ) {
                    showRewardMessage(
                        `Wow! ${extendedState.currentStreak} questions in a row!`
                    );
                    gameState.coins += 10;
                    extendedState.coinsEarned += 10;
                    updateUI();
                }

                if (extendedState.currentStreak > extendedState.highestStreak) {
                    extendedState.highestStreak = extendedState.currentStreak;
                }
            }

            function showRewardMessage(message) {
                const rewardDiv = document.createElement("div");
                rewardDiv.textContent = message;
                rewardDiv.className = "reward-message";

                document.body.appendChild(rewardDiv);

                setTimeout(() => {
                    rewardDiv.remove();
                }, 3000);
            }

            function createGlobalProgressBar() {
                const container = document.getElementById(
                    "global-progress-container"
                );
                if (!container) return;

                container.innerHTML = "";

                const progressContainer = document.createElement("div");
                progressContainer.style.cssText = `
                    margin: 15px 0;
                    background: #f5f5f5;
                    border-radius: 10px;
                    padding: 10px;
                `;

                const label = document.createElement("div");
                label.textContent = "Overall Progress";
                label.style.cssText = `
                    text-align: center;
                    font-weight: bold;
                    margin-bottom: 8px;
                    color: var(--primary-color);
                `;

                const progressBar = document.createElement("div");
                progressBar.className = "progress-bar";

                const progressFill = document.createElement("div");
                progressFill.id = "global-progress-fill";
                progressFill.className = "progress-fill";

                progressBar.appendChild(progressFill);
                progressContainer.appendChild(label);
                progressContainer.appendChild(progressBar);
                container.appendChild(progressContainer);

                updateGlobalProgress();
            }

            function updateGlobalProgress() {
                let totalQuestions = 0;
                let correctAnswers = 0;

                Object.keys(quizData).forEach((level) => {
                    const levelNum = parseInt(level);
                    const progress = extendedState.levelProgress[levelNum] || {
                        correct: 0,
                        total: 0,
                    };
                    correctAnswers += progress.correct || 0;
                    totalQuestions += progress.total || 0;
                });

                const percentage =
                    totalQuestions > 0 ?
                    Math.round((correctAnswers / totalQuestions) * 100) :
                    0;
                const progressFill = document.getElementById("global-progress-fill");

                if (progressFill) {
                    progressFill.style.width = `${percentage}%`;

                    if (percentage >= 100) {
                        progressFill.style.background = "#388e3c";
                    } else if (percentage >= 75) {
                        progressFill.style.background = "#f9a825";
                    } else if (percentage >= 30) {
                        progressFill.style.background = "#ff9800";
                    } else {
                        progressFill.style.background = "#d32f2f";
                    }
                }
            }

            function createStatsToggle() {
                const container = document.getElementById("stats-container");
                if (!container) return;

                container.innerHTML = "";

                const toggleButton = document.createElement("button");
                toggleButton.id = "stats-toggle-btn";
                toggleButton.textContent = "📊 Show Stats";

                const statsContent = document.createElement("div");
                statsContent.id = "stats-content";
                statsContent.style.display = "none";

                const levelAccuracyContainer = document.getElementById(
                    "level-accuracy-container"
                );

                toggleButton.addEventListener("click", () => {
                    extendedState.showStats = !extendedState.showStats;
                    statsContent.style.display = extendedState.showStats ?
                        "block" :
                        "none";

                    if (levelAccuracyContainer) {
                        levelAccuracyContainer.style.display = extendedState.showStats ?
                            "block" :
                            "none";
                    }

                    toggleButton.textContent = extendedState.showStats ?
                        "📊 Hide Stats" :
                        "📊 Show Stats";
                    updateStatsDisplay();
                });

                container.appendChild(toggleButton);
                container.appendChild(statsContent);
                updateStatsDisplay();
            }

            function updateStatsDisplay() {
                const statsContent = document.getElementById("stats-content");
                if (statsContent) {
                    statsContent.innerHTML = `
                        <strong>Coins Earned:</strong> ${extendedState.coinsEarned}<br>
                        <strong>Coins Used:</strong> ${extendedState.coinsUsed}<br>
                        <strong>Highest Streak:</strong> ${extendedState.highestStreak} correct answers
                    `;
                }
            }

            function createMainAccuracyProgressBar() {
                const homeScreen = document.getElementById("home-screen");
                const existingMainProgress = document.getElementById(
                    "main-accuracy-progress"
                );

                if (existingMainProgress) {
                    existingMainProgress.remove();
                }

                const mainProgressContainer = document.createElement("div");
                mainProgressContainer.id = "main-accuracy-progress";

                const label = document.createElement("div");
                label.id = "main-accuracy-label";
                label.textContent = "Overall Accuracy";

                const progressBar = document.createElement("div");
                progressBar.id = "main-accuracy-bar";

                const progressFill = document.createElement("div");
                progressFill.id = "main-accuracy-fill";

                const percentageDisplay = document.createElement("div");
                percentageDisplay.id = "main-accuracy-percentage";
                percentageDisplay.textContent = "0%";

                progressBar.appendChild(progressFill);
                mainProgressContainer.appendChild(label);
                mainProgressContainer.appendChild(progressBar);
                mainProgressContainer.appendChild(percentageDisplay);

                const levelSelection = document.getElementById("level-selection");
                homeScreen.insertBefore(mainProgressContainer, levelSelection);

                updateMainAccuracyProgress();
            }

            function updateMainAccuracyProgress() {
                let totalQuestions = 0;
                let correctAnswers = 0;

                Object.keys(quizData).forEach((level) => {
                    const levelNum = parseInt(level);
                    const progress = extendedState.levelProgress[levelNum] || {
                        correct: 0,
                        total: 0,
                    };
                    correctAnswers += progress.correct || 0;
                    totalQuestions += progress.total || 0;
                });

                const percentage =
                    totalQuestions > 0 ?
                    Math.round((correctAnswers / totalQuestions) * 100) :
                    0;
                const progressFill = document.getElementById("main-accuracy-fill");
                const percentageDisplay = document.getElementById(
                    "main-accuracy-percentage"
                );

                if (progressFill && percentageDisplay) {
                    progressFill.style.width = `${percentage}%`;
                    percentageDisplay.textContent = `${percentage}%`;

                    if (percentage >= 75) {
                        progressFill.style.background = "#388e3c";
                    } else if (percentage >= 30) {
                        progressFill.style.background = "#f9a825";
                    } else {
                        progressFill.style.background = "#d32f2f";
                    }
                }
            }

            // --- Event Listeners ---
            buttons.nextLevel.addEventListener("click", () => {
                startLevel(currentLevel + 1);
            });
            buttons.homeFromComplete.addEventListener("click", renderHomeScreen);
            buttons.homeFromLockout.addEventListener("click", renderHomeScreen);
            buttons.unlockWithCoins.addEventListener("click", payToUnlock);

            // --- Initialisation ---
            function init() {
                loadState();
                updateUI();
                renderHomeScreen();
                createMainAccuracyProgressBar();
                preloadAudio();
                setupGlobalClickSound();

                // NEW: Initialize Fiqh Facts
                initializeFiqhFacts();
            }

            init();
        });
    </script>
</body>

</html>
